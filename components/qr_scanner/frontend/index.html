<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; font-family: sans-serif; }
    #reader {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }
    #reader video {
      border-radius: 8px;
      width: 100% !important;
      height: var(--scan-h, 400px) !important;
      object-fit: cover;
    }
    #reader__scan_region {
      background: #000 !important;
      height: var(--scan-h, 400px) !important;
      overflow: hidden;
    }
    #reader__scan_region img { display: none; }
    #reader__dashboard { padding: 4px !important; }
    #reader__dashboard_section_csr { display: none !important; }
    #reader.flash {
      animation: flashAnim 0.45s ease-out;
    }
    @keyframes flashAnim {
      0%   { box-shadow: 0 0 0 0 rgba(40, 200, 80, 0.9); filter: brightness(1.4); }
      60%  { box-shadow: 0 0 0 12px rgba(40, 200, 80, 0); filter: brightness(1.1); }
      100% { box-shadow: 0 0 0 0 rgba(40, 200, 80, 0); filter: brightness(1); }
    }
    #status {
      margin-top: 8px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    #status.ok  { background: #d4edda; color: #155724; display: block; }
    #status.err { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <div id="reader"></div>
  <div id="status"></div>

  <script>
    // ── Streamlit 통신 ──────────────────────────────────
    function sendValue(value) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        apiVersion: 1,
        type: "streamlit:setComponentValue",
        value: value,
        dataType: "json"
      }, "*");
    }

    function setHeight() {
      window.parent.postMessage({
        isStreamlitMessage: true,
        apiVersion: 1,
        type: "streamlit:setFrameHeight",
        height: document.body.scrollHeight + 16
      }, "*");
    }

    // Streamlit이 보내는 render 이벤트 처리
    window.addEventListener("message", function(e) {
      if (e.data && e.data.type === "streamlit:render") {
        setHeight();
      }
    });

    window.parent.postMessage({
      isStreamlitMessage: true,
      apiVersion: 1,
      type: "streamlit:componentReady"
    }, "*");

    // ── QR 스캐너 ────────────────────────────────────────
    const status = document.getElementById("status");
    let lastResult = null;
    let resetTimer = null;
    let scanner = null;

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 1100;
        gain.gain.setValueAtTime(0.18, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
        osc.connect(gain).connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch (e) {}
    }

    function vibrate() {
      if (navigator.vibrate) navigator.vibrate(80);
    }

    function flashReader() {
      const reader = document.getElementById("reader");
      reader.classList.remove("flash");
      void reader.offsetWidth; // reflow
      reader.classList.add("flash");
    }

    function onScanSuccess(text) {
      if (text === lastResult) return;
      lastResult = text;
      status.className = "ok";
      status.textContent = "✅ QR 인식됨";
      flashReader();
      beep();
      vibrate();
      // 매번 unique한 값으로 보내야 Streamlit이 rerun을 트리거함
      sendValue({ text: text, ts: Date.now() });
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(() => { lastResult = null; }, 1500);
    }

    function applyScanHeight() {
      // 화면 높이 기준 — 한 화면에 꽉 차되 결과 박스/탭 공간 확보
      const vh = window.parent.innerHeight || window.innerHeight;
      const vw = window.innerWidth;
      // 사용 가능 높이의 약 55%, 폭/높이 둘 다 고려
      const byHeight = Math.floor(vh * 0.55);
      const byWidth = Math.floor(vw * 1.0);
      const h = Math.min(Math.max(Math.min(byHeight, byWidth), 280), 460);
      document.documentElement.style.setProperty("--scan-h", h + "px");
      return h;
    }

    function qrboxSize(viewW, viewH) {
      const minEdge = Math.min(viewW, viewH);
      const size = Math.floor(minEdge * 0.7);
      return { width: size, height: size };
    }

    function bumpHeight() {
      applyScanHeight();
      [100, 400, 1000, 2000].forEach(t => setTimeout(() => {
        applyScanHeight();
        setHeight();
      }, t));
    }

    function startScanner() {
      scanner = new Html5Qrcode("reader");
      const config = {
        fps: 30,
        qrbox: qrboxSize,
        videoConstraints: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 },
        },
      };
      scanner.start(
        { facingMode: { ideal: "environment" } },
        config,
        onScanSuccess
      ).then(bumpHeight)
       .catch(() => {
         scanner.start(
           { facingMode: "user" },
           config,
           onScanSuccess
         ).then(bumpHeight)
          .catch(() => {
            status.className = "err";
            status.textContent = "❌ 카메라 접근 실패";
            setHeight();
          });
       });
    }

    startScanner();
    window.addEventListener("resize", setHeight);
  </script>
</body>
</html>
