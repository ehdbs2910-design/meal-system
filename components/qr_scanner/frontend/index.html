<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; font-family: sans-serif; }
    #reader {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }
    #reader video {
      border-radius: 8px;
      width: 100% !important;
      height: var(--scan-h, 400px) !important;
      object-fit: cover;
    }
    #reader__scan_region {
      background: #000 !important;
      height: var(--scan-h, 400px) !important;
      overflow: hidden;
    }
    #reader__scan_region img { display: none; }
    #reader__dashboard { padding: 4px !important; }
    #reader__dashboard_section_csr { display: none !important; }
    #status {
      margin-top: 8px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    #status.ok  { background: #d4edda; color: #155724; display: block; }
    #status.err { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <div id="reader"></div>
  <div id="status"></div>

  <script>
    // ── Streamlit 통신 ──────────────────────────────────
    function sendValue(value) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        apiVersion: 1,
        type: "streamlit:setComponentValue",
        value: value,
        dataType: "json"
      }, "*");
    }

    function setHeight() {
      window.parent.postMessage({
        isStreamlitMessage: true,
        apiVersion: 1,
        type: "streamlit:setFrameHeight",
        height: document.body.scrollHeight + 16
      }, "*");
    }

    // Streamlit이 보내는 render 이벤트 처리
    window.addEventListener("message", function(e) {
      if (e.data && e.data.type === "streamlit:render") {
        setHeight();
      }
    });

    window.parent.postMessage({
      isStreamlitMessage: true,
      apiVersion: 1,
      type: "streamlit:componentReady"
    }, "*");

    // ── QR 스캐너 ────────────────────────────────────────
    const status = document.getElementById("status");
    let lastResult = null;
    let scanner = null;

    function onScanSuccess(text) {
      if (text === lastResult) return;
      lastResult = text;
      status.className = "ok";
      status.textContent = "✅ QR 인식됨";
      sendValue(text);
      setTimeout(() => { lastResult = null; }, 2000); // 2초 후 같은 QR 재인식 허용
    }

    function applyScanHeight() {
      // iframe 폭 기준으로 정사각형에 가까운 높이 (최대 500px)
      const w = window.innerWidth;
      const h = Math.min(Math.max(Math.floor(w * 1.0), 320), 500);
      document.documentElement.style.setProperty("--scan-h", h + "px");
      return h;
    }

    function qrboxSize(viewW, viewH) {
      const minEdge = Math.min(viewW, viewH);
      const size = Math.floor(minEdge * 0.7);
      return { width: size, height: size };
    }

    function bumpHeight() {
      applyScanHeight();
      [100, 400, 1000, 2000].forEach(t => setTimeout(() => {
        applyScanHeight();
        setHeight();
      }, t));
    }

    function startScanner() {
      scanner = new Html5Qrcode("reader");
      const config = {
        fps: 30,
        qrbox: qrboxSize,
        videoConstraints: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 },
        },
      };
      scanner.start(
        { facingMode: { ideal: "environment" } },
        config,
        onScanSuccess
      ).then(bumpHeight)
       .catch(() => {
         scanner.start(
           { facingMode: "user" },
           config,
           onScanSuccess
         ).then(bumpHeight)
          .catch(() => {
            status.className = "err";
            status.textContent = "❌ 카메라 접근 실패";
            setHeight();
          });
       });
    }

    startScanner();
    window.addEventListener("resize", setHeight);
  </script>
</body>
</html>
